{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "surrealdb-credential-operator.fullname" . }}-manager-role
  labels:
    {{- include "surrealdb-credential-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["surrealdb.seamlezz.com"]
    resources: ["surrealdbproviders", "surrealdbtenantpolicies", "surrealdbcredentials"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["surrealdb.seamlezz.com"]
    resources: ["surrealdbproviders/status", "surrealdbtenantpolicies/status", "surrealdbcredentials/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["surrealdb.seamlezz.com"]
    resources: ["surrealdbproviders/finalizers", "surrealdbtenantpolicies/finalizers", "surrealdbcredentials/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "surrealdb-credential-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "surrealdb-credential-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "surrealdb-credential-operator.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "surrealdb-credential-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- if .Values.leaderElection.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "surrealdb-credential-operator.fullname" . }}-leader-election-role
  labels:
    {{- include "surrealdb-credential-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "surrealdb-credential-operator.fullname" . }}-leader-election-rolebinding
  labels:
    {{- include "surrealdb-credential-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "surrealdb-credential-operator.fullname" . }}-leader-election-role
subjects:
  - kind: ServiceAccount
    name: {{ include "surrealdb-credential-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
