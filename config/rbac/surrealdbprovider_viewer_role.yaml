# This rule is not used by the project surrealdb-credential-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to surrealdb.seamlezz.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: surrealdb-credential-operator
    app.kubernetes.io/managed-by: kustomize
  name: surrealdbprovider-viewer-role
rules:
- apiGroups:
  - surrealdb.seamlezz.com
  resources:
  - surrealdbproviders
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - surrealdb.seamlezz.com
  resources:
  - surrealdbproviders/status
  verbs:
  - get
