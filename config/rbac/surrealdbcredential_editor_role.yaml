# This rule is not used by the project surrealdb-credential-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the surrealdb.seamlezz.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: surrealdb-credential-operator
    app.kubernetes.io/managed-by: kustomize
  name: surrealdbcredential-editor-role
rules:
- apiGroups:
  - surrealdb.seamlezz.com
  resources:
  - surrealdbcredentials
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - surrealdb.seamlezz.com
  resources:
  - surrealdbcredentials/status
  verbs:
  - get
